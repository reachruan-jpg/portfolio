              <h1>饿小宝IP形象设计</h1>
            </div>
            <div class="figma-tags">

          <div class="project-detail-intro-copy">
            <p class="project-detail-lead">
              平台消费场景增加，品牌定位由送餐转变为送万物。同时随着用户趋于年轻化，饿了么亟需一个能贴近年轻用户，并与他们建立有效沟通的 IP 形象，来提升品牌的好感度。
            </p>
            <p class="project-detail-lead">
              饿了么此前一直使用企业文化 IP 形象——Blueblue，其定位主要服务企业员工，用户难以形成身份认同。另外形象原形为骑手，已经不符合本地生活平台定位，且缺少品牌特征，难以满足品牌沟通需求。
            </p>
