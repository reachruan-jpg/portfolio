              品牌从工具平台转变为生活服务平台，希望建立「万物可送」业务心智，进而打造以人为核心的三公里理想生活圈服务，满足用户全方面的需求，为消费者带来更加精准、便捷、涵盖全品类的生活服务新体验。
            </p>
            <p class="project-detail-lead">
              <strong>业务目标：</strong>打破消费者对于饿了么外卖只能送餐的固有印象，加强用户不同需求场景与饿了么之间的联想，传递「饿了么不只送餐，还送万物」的品牌心智。
            </p>
            <p class="project-detail-lead">
              <strong>设计目标：</strong>通过承接全新品牌定位，塑造年轻有态度的品牌视觉调性，在线下线上渠道中统一传达。
            </p>
